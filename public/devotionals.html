<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Devotionals</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family: Arial; background:#f4f6f8; text-align:center; }

.devotional-list {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap:20px;
  padding:40px;
}

.devotional-item {
  background:white;
  padding:15px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.devotional-image {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:8px;
}

a { text-decoration:none; color:#0070f3; }
</style>
</head>

<body>

<h1>Daily Devotionals</h1>

<div class="devotional-list"></div>

<script>
fetch('/devotionals.json')
  .then(res => res.json())
  .then(devotionals => {
    const container = document.querySelector('.devotional-list');
    container.innerHTML = '';

    devotionals.forEach(d => {
      const div = document.createElement('div');
      div.className = 'devotional-item';

     const imageFile = `/${d.file.replace('.html', '.jpg')}`;

      div.innerHTML = `
        <a href="/devotionals/${d.file}">
          <img src="${imageFile}" class="devotional-image">
          <h3>${d.title}</h3>
          <p>${d.date}</p>
        </a>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>
